llm:
  primary_model: kimi-k2.5
  prompt_file: configs/prompts/factor_gen_us.txt
  fallback_models:
    - gemini-2.5-flash
  excluded_models:
    - gemini-3.1-pro-preview

  retry:
    max_retries: 3
    backoff_base_seconds: 2
    backoff_max_seconds: 60

  budget:
    max_requests_per_run: 250
    max_total_tokens_per_run: 250000
    max_consecutive_failures: 3

  factor_generation:
    max_attempts_per_factor: 3
    max_batch_failure_rate: 0.50
    target_factors_per_run: 200
